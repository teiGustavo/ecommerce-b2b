name: ecommerce_b2b
description: "Um projeto Flutter para E-commerce B2B (Atacado)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_it: ^8.0.3
  go_router: ^14.3.0
  flutter_launcher_icons: ^0.14.4
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  formz: ^0.8.0
  mask_text_input_formatter: ^2.9.0
  drift: ^2.16.0
  sqlite3: ^2.4.2
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  drift_dev: ^2.16.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/icon/